{% extends "site_base.html" %}
{% block title %}{{ item.title }} — HomeEdu{% endblock %}
{% block content %}
<div class="row">
  <div>
    <h1 class="h1">{{ item.title }}</h1>
    <p class="sub">{{ item.description|linebreaks }}</p>
  </div>
  <a class="btn small" href="{% url 'parents:list' %}">← Ro‘yxat</a>
</div>

{% if item.video_url %}
  <div class="card" style="margin-top: 16px;">
    <div style="border-radius:16px; overflow:hidden; border:1px solid rgba(0,0,0,.10);">
      <iframe style="width:100%; aspect-ratio: 16/9; border:0;" src="{{ item.video_url }}" allowfullscreen></iframe>
    </div>
  </div>
{% endif %}
{% endblock %}
